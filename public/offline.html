<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Tourliz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
        .icon-container {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 24px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; color: #f87171; }
        }
        .btn-retry {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            border: none;
            color: white;
            font-weight: 500;
            padding: 12px 28px;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.4);
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.5);
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="icon-container">
            <i class="bi bi-wifi-off"></i>
        </div>
        <h2 class="fw-bold mb-3">Connection Lost</h2>
        <p class="text-muted mb-4">You are currently offline. Please check your internet connection and try reloading the page.</p>
        <button onclick="window.location.reload();" class="btn btn-retry btn-lg w-100">
            <i class="bi bi-arrow-clockwise me-2"></i>Retry Connection
        </button>
    </div>
</body>
</html>
